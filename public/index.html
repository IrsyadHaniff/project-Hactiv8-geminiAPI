<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonXbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>

    <div class="bg-orbs" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <div class="container">

      <header class="chat-header">
        <div class="header-left">
          <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <div class="avatar">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73A2 2 0 0 1 10 4a2 2 0 0 1 2-2z"/>
                <circle cx="7.5" cy="14.5" r="1.5"/><circle cx="16.5" cy="14.5" r="1.5"/>
              </svg>
            </div>
          </div>
          <div class="header-info">
            <h1 class="bot-name">MonXbot</h1>
            <div class="status-row">
              <span class="status-dot"></span>
              <span class="status-text">Online</span>
            </div>
          </div>
        </div>
        <button class="icon-btn" id="clear-btn" title="Hapus chat" aria-label="Hapus chat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      </header>

      <main id="chat-box" role="log" aria-live="polite">
        <div class="welcome">
          <div class="welcome-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <p>Halo! Saya <strong>MonXbot</strong>.<br/>Ada yang bisa saya bantu hari ini?</p>
        </div>
      </main>

      <footer class="input-area">
        <!-- Image preview bar -->
        <div id="img-preview-bar" class="img-preview-bar hidden">
          <div class="img-preview-inner">
            <img id="img-preview-thumb" src="" alt="Preview" />
            <button id="img-remove-btn" class="img-remove-btn" aria-label="Hapus gambar">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <span id="img-preview-name" class="img-preview-name"></span>
        </div>

        <form id="chat-form" autocomplete="off">
          <!-- Hidden file input -->
          <input type="file" id="file-input" accept="image/*" aria-label="Upload gambar" hidden />

          <div class="input-wrap">
            <!-- Upload button -->
            <button type="button" id="upload-btn" class="upload-btn" aria-label="Upload gambar">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </button>

            <textarea id="user-input" placeholder="Tulis pesan..." rows="1" aria-label="Tulis pesan"></textarea>

            <button type="submit" class="send-btn" aria-label="Kirim">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          <p class="hint">Tekan <kbd>Enter</kbd> kirim &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> baris baru</p>
        </form>
      </footer>

    </div>

    <script src="/js/script.js"></script>
  </body>
</html>
